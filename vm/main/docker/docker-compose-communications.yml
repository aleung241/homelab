services:
  thelounge:
    image: thelounge/thelounge
    container_name: thelounge
    volumes:
      - ${DOCKER_DIRECTORY_BASE_PATH}/thelounge:/var/opt/thelounge
    ports:
      - "9100:9000"
    extends:
      file: common.yaml
      service: common
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1

  apprise:
    image: caronc/apprise:latest
    container_name: apprise
    environment:
      APPRISE_STATEFUL_MODE: simple
      APPRISE_WORKER_COUNT: "1"
      APPRISE_ADMIN: "yes"
      IPV4_ONLY: "yes"
    volumes:
      - ${DOCKER_DIRECTORY_BASE_PATH}/apprise/config:/config
      - ${DOCKER_DIRECTORY_BASE_PATH}/apprise/plugin:/plugin
      - ${DOCKER_DIRECTORY_BASE_PATH}/apprise/attach:/attach
    ports:
      - "8051:8000"
    extends:
      file: common.yaml
      service: common
